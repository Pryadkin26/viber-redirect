<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Открываем Viber...</title>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const appUrl = "viber://chat?number=%2B380633466498";

      window.location.href = appUrl;

      setTimeout(function () {
        document.getElementById("fallback").style.display = "block";
      }, 1200);
    });
  </script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f6f4fb;
      color: #2f2f2f;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .box {
      max-width: 420px;
      background: white;
      padding: 32px 24px;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,.08);
    }
    .btn {
      display: inline-block;
      margin-top: 16px;
      padding: 14px 22px;
      border-radius: 10px;
      text-decoration: none;
      background: #7360f2;
      color: #fff;
      font-weight: 700;
    }
    #fallback {
      display: none;
    }
    .note {
      margin-top: 14px;
      font-size: 14px;
      opacity: .75;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Открываем Viber...</h1>
    <p>Если переход не произошёл автоматически, нажмите кнопку ниже.</p>

    <div id="fallback">
      <a class="btn" href="viber://chat?number=%2B380633466498">Открыть Viber</a>
      <div class="note">Номер: +380633466498</div>
    </div>
  </div>
</body>
</html>
